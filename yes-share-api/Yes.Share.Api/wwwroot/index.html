<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yes.Share - 局域网文件共享</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/highlight.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="container mt-5" style="max-width: 400px;">
        <div class="text-end mb-2">
             <select class="form-select form-select-sm d-inline-block" style="width: auto;" onchange="setLang(this.value)" id="lang-select-login">
                <option value="zh-CN">中文</option>
                <option value="en-US">English</option>
            </select>
        </div>
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title text-center mb-4" id="login-title">Yes.Share 登录</h3>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label" id="lbl-username">用户名</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" id="lbl-password">密码</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" id="btn-login">登录</button>
                        <button type="button" class="btn btn-secondary" id="btn-register-mode">注册</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Main App View -->
    <div id="app-view" class="d-none">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Yes.Share</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" data-page="files" id="nav-files">文件列表</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-page="dashboard" id="nav-dashboard">系统看板</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center">
                        <select class="form-select form-select-sm me-3" style="width: auto;" onchange="setLang(this.value)" id="lang-select">
                            <option value="zh-CN">中文</option>
                            <option value="en-US">English</option>
                        </select>
                        <span class="navbar-text me-3" id="user-display"></span>
                        <button class="btn btn-outline-light btn-sm" id="btn-logout">退出</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mt-4" id="content-area">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- Image Preview Tooltip (Removed) -->
    <!-- <div id="img-preview-tooltip" class="img-preview-tooltip">
        <img id="img-preview-image" src="" alt="Preview">
    </div> -->

    <!-- Modals -->
    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-preview-title">文件预览</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <pre><code id="preview-content"></code></pre>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="btn-copy-preview">复制全文</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="btn-close-preview">关闭</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Image Preview Modal -->
    <div class="modal fade" id="imagePreviewModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-transparent border-0 shadow-none">
                <div class="modal-body p-0 text-center position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index: 10; background-color: rgba(0,0,0,0.5); padding: 10px;"></button>
                    <img id="preview-image-modal-img" src="" class="img-fluid rounded shadow-lg" alt="Preview">
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
